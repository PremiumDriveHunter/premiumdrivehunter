backend:
  name: git-gateway
  branch: main

media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "recherches"
    label: "Recherches en cours"
    folder: "recherches"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titre du véhicule", name: "titre", widget: "string" }
      - { label: "Budget", name: "budget", widget: "string" }
      - { label: "Statut", name: "statut", widget: "select", options: ["En recherche", "En négociation", "Trouvé"] }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Photo", name: "photo", widget: "image" }
